# Drissman Backend

## Application
spring.application.name=drissman-backend
server.port=8080
app.upload.dir=uploads/images
app.superadmin.secret=${SUPERADMIN_SECRET:DRISSMAN_SUPER_SECRET}

## PostgreSQL R2DBC
spring.r2dbc.url=r2dbc:postgresql://127.0.0.1:5433/drissman
spring.r2dbc.username=${DB_USERNAME:drissman}
spring.r2dbc.password=${DB_PASSWORD:drissman_secret}

## PostgreSQL JDBC (for Liquibase)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/drissman
spring.datasource.username=${DB_USERNAME:drissman}
spring.datasource.password=${DB_PASSWORD:drissman_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

## Liquibase
## NB : avec R2DBC, Spring Boot ne crée pas de DataSource JDBC ; Liquibase
## a donc besoin de sa propre connexion (sinon il ne s'exécute jamais).
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
## Contexts : 'dev' en local (charge les données de démo) ; 'prod' en production
## pour EXCLURE tous les changesets de seed tagués context:dev. NB : sans cette
## propriété, Liquibase exécute TOUS les changesets, y compris ceux tagués dev.
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:prod}
spring.liquibase.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/drissman}
spring.liquibase.user=${DB_USERNAME:drissman}
spring.liquibase.password=${DB_PASSWORD:drissman_secret}

## JWT
jwt.secret=${JWT_SECRET:drissman-super-secret-key-change-in-production-at-least-256-bits}
jwt.expiration=86400000

## Kernel (yowyob) — identité machine serveur-vers-serveur.
## SECRETS : jamais ici. Valeurs via variables d'environnement,
## ou en local via application-local.properties (gitignoré).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
kernel.base-url=${KERNEL_BASE_URL:https://kernel-core.yowyob.com}
kernel.client-id=${KERNEL_CLIENT_ID:}
kernel.api-key=${KERNEL_API_KEY:}
kernel.tenant-id=${KERNEL_TENANT_ID:}

## MODÈLE A — Drissman est une application ORGANISATIONNELLE : elle consomme les
## services kernel au nom d'UNE organisation (l'opérateur), pas d'une par école.
## L'organisation se crée une seule fois à la main sur https://ksm.yowyob.com
## (business actor approuvé -> espace/tenant -> organisation -> services).
## Sans cette valeur, les appels org-scopés sont ignorés (KERNEL_MIRROR SKIP).
kernel.organization-id=${KERNEL_ORGANIZATION_ID:}

## Payment Core kernel (module 12-payment-plan) — Mobile Money via MyCoolPay.
## serviceCode : code du service facturé côté kernel (à aligner avec les
## allowedServices de la ClientApplication). currency : XAF (FCFA).
## callback-url : URL publique que le kernel appelle pour notifier le statut.
kernel.payment.service-code=${KERNEL_PAYMENT_SERVICE_CODE:PAYMENT}
kernel.payment.currency=${KERNEL_PAYMENT_CURRENCY:XAF}
kernel.payment.callback-url=${KERNEL_PAYMENT_CALLBACK_URL:}

## Notifications kernel (module 09-files-notifications) — notifs natives.
## channel : EMAIL par défaut (provider natif fiable) ; SMS|WHATSAPP|PUSH|WEBSOCKET
## activables une fois le provider correspondant provisionné côté kernel.
## enabled=false pour couper les envois sans toucher au code.
kernel.notification.enabled=${KERNEL_NOTIFICATION_ENABLED:true}
kernel.notification.channel=${KERNEL_NOTIFICATION_CHANNEL:EMAIL}

## Yowyob Payment (paiement carte via Stripe Checkout) — compte de service.
payment.base-url=${PAYMENT_BASE_URL:https://payment-dev.yowyob.com}
payment.email=${PAYMENT_EMAIL:}
payment.password=${PAYMENT_PASSWORD:}
payment.wallet-id=${PAYMENT_WALLET_ID:}

## Actuator (healthcheck yowyob) — Redis est déclaré mais pas utilisé :
## son indicateur ferait tomber /actuator/health en DOWN.
management.health.redis.enabled=false
management.endpoints.web.exposure.include=health

## Logging
logging.level.org.springframework.r2dbc=INFO
logging.level.liquibase=INFO
## Mirroring Kernel : logger dédié et greppable (op=… outcome=OK|SKIP|FAIL).
## Mettre à DEBUG pour tracer aussi les observations GPS haute fréquence.
logging.level.KERNEL_MIRROR=INFO
