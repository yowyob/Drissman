databaseChangeLog:
  - changeSet:
      id: 032-create-offer-modules-table
      author: drissman
      changes:
        - createTable:
            tableName: offer_modules
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: offer_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_offer_modules_offer
                    references: offers(id)
              - column:
                  name: module_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_offer_modules_module
                    references: modules(id)
              - column:
                  name: order_index
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: offer_modules
            columnNames: offer_id, module_id
            constraintName: uq_offer_module
