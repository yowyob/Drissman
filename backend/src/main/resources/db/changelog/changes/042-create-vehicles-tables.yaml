databaseChangeLog:
  - changeSet:
      id: 042-create-vehicles-tables
      author: drissman
      comment: Véhicules des auto-écoles + historique de positions GPS (P5).
      changes:
        - createTable:
            tableName: vehicles
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: school_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: monitor_id
                  type: uuid
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: plate_number
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: double precision
              - column:
                  name: longitude
                  type: double precision
              - column:
                  name: last_position_at
                  type: timestamp
              - column:
                  name: kernel_resource_id
                  type: uuid
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: vehicles
            baseColumnNames: school_id
            referencedTableName: schools
            referencedColumnNames: id
            constraintName: fk_vehicles_school
            onDelete: CASCADE
        - createTable:
            tableName: vehicle_positions
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicle_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: double precision
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: double precision
                  constraints:
                    nullable: false
              - column:
                  name: recorded_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: vehicle_positions
            baseColumnNames: vehicle_id
            referencedTableName: vehicles
            referencedColumnNames: id
            constraintName: fk_positions_vehicle
            onDelete: CASCADE
        - createIndex:
            tableName: vehicle_positions
            indexName: idx_positions_vehicle_time
            columns:
              - column:
                  name: vehicle_id
              - column:
                  name: recorded_at
