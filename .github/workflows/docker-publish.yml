name: Publish Docker image (GHCR)
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**"]
  workflow_dispatch:
jobs:
  build:
    if: github.repository == 'yowyob/Drissman'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # ---- Backend (Java R2DBC, port 8080) ----
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:backend-${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:backend-main
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ---- Frontend (Next.js) : Dockerfile généré ici (npm start, API bakée) ----
      - name: Generate frontend Dockerfile (CI)
        run: |
          cat > ./frontend/Dockerfile.ci <<'DF'
          FROM node:20-alpine AS build
          WORKDIR /app
          ENV NEXT_TELEMETRY_DISABLED=1
          ARG NEXT_PUBLIC_API_URL
          ENV NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          COPY package.json package-lock.json* ./
          RUN npm install --no-audit --no-fund --legacy-peer-deps
          COPY . .
          RUN mkdir -p public && npm run build
          FROM node:20-alpine AS runtime
          WORKDIR /app
          ENV NODE_ENV=production NEXT_TELEMETRY_DISABLED=1 PORT=3000
          RUN addgroup -S nodejs && adduser -S nextjs -G nodejs
          COPY --from=build /app/package.json /app/package-lock.json* ./
          COPY --from=build /app/node_modules ./node_modules
          COPY --from=build /app/.next ./.next
          COPY --from=build /app/public ./public
          COPY --from=build /app/next.config.* ./
          USER nextjs
          EXPOSE 3000
          CMD ["npm", "run", "start"]
          DF
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.ci
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://drisman.yowyob.com/drisman-api/api
          tags: |
            ${{ steps.meta.outputs.image }}:frontend-${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:frontend-main
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
