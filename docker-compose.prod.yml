# ============================================================================
#  Drissman full-stack sur l'infra yowyob (un seul domaine drisman.yowyob.com)
#   - frontend Next.js   -> racine        Host(drisman.yowyob.com)
#   - backend  Java R2DBC -> /drisman-api  Host(drisman.yowyob.com) && PathPrefix
#  Secrets backend : /home/gi/drissman/.env (déposé manuellement, jamais commité).
#  Images construites par le CI : BACKEND_IMAGE / FRONTEND_IMAGE.
# ============================================================================
services:

  drissman-backend:
    image: "${BACKEND_IMAGE:?BACKEND_IMAGE requis - construit par le CI}"
    container_name: drissman-backend
    pull_policy: always
    restart: unless-stopped
    env_file: [.env]
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_R2DBC_URL: "r2dbc:postgresql://database:5432/drissman"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://database:5432/drissman"
      SPRING_LIQUIBASE_URL: "jdbc:postgresql://database:5432/drissman"
      DB_USERNAME: "${DB_USERNAME:?requis dans .env}"
      DB_PASSWORD: "${DB_PASSWORD:?requis dans .env}"
      KERNEL_BASE_URL: "http://kernel-core-kernel-layer-1:8080"
      KERNEL_CLIENT_ID: "${KERNEL_CLIENT_ID:?requis dans .env}"
      KERNEL_API_KEY: "${KERNEL_API_KEY:?requis dans .env}"
      KERNEL_TENANT_ID: "${KERNEL_TENANT_ID:?requis dans .env}"
      JWT_SECRET: "${JWT_SECRET:?requis dans .env}"
      SUPERADMIN_SECRET: "${SUPERADMIN_SECRET:?requis dans .env}"
      PAYMENT_BASE_URL: "${PAYMENT_BASE_URL:-https://payment-dev.yowyob.com}"
      PAYMENT_EMAIL: "${PAYMENT_EMAIL:-}"
      PAYMENT_PASSWORD: "${PAYMENT_PASSWORD:-}"
      PAYMENT_WALLET_ID: "${PAYMENT_WALLET_ID:-}"
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-https://drisman.yowyob.com}"
      SERVER_FORWARD_HEADERS_STRATEGY: "framework"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    logging: { driver: "json-file", options: { max-size: "50m", max-file: "5" } }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drisman-api.rule=Host(`drisman.yowyob.com`) && PathPrefix(`/drisman-api`)"
      - "traefik.http.routers.drisman-api.entrypoints=websecure"
      - "traefik.http.routers.drisman-api.tls=true"
      - "traefik.http.routers.drisman-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.drisman-api.priority=100"
      - "traefik.http.middlewares.drisman-strip.stripprefix.prefixes=/drisman-api"
      - "traefik.http.routers.drisman-api.middlewares=drisman-strip"
      - "traefik.http.services.drisman-api.loadbalancer.server.port=8080"
      - "traefik.docker.network=yowyob"
    networks: [yowyob]

  drissman-frontend:
    image: "${FRONTEND_IMAGE:?FRONTEND_IMAGE requis - construit par le CI}"
    container_name: drissman-frontend
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s
    logging: { driver: "json-file", options: { max-size: "50m", max-file: "5" } }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drisman-web.rule=Host(`drisman.yowyob.com`)"
      - "traefik.http.routers.drisman-web.entrypoints=websecure"
      - "traefik.http.routers.drisman-web.tls=true"
      - "traefik.http.routers.drisman-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.drisman-web.priority=10"
      - "traefik.http.services.drisman-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=yowyob"
    networks: [yowyob]

networks:
  yowyob:
    external: true
    name: yowyob
